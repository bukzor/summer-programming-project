# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
$schema: "http://json-schema.org/draft-07/schema#"
description: >
  Concrete implementable pieces (functions, data structures) that realize
  the design — responsibility, scope, and interface.
type: object
additionalProperties: false
properties:
  why:
    description: Paths to the design entries this component realizes.
    type: array
    items:
      type: string
  tags:
    description: Topic tags for cross-referencing.
    type: array
    items:
      type: string
