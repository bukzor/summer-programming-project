# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
$schema: "http://json-schema.org/draft-07/schema#"
description: >
  Cross-cutting normative design rules — means, not ends. Each policy binds
  with a declared force (RFC 2119 requirement levels) and links upward via
  why[] to the goal or mission it serves. The body states the rule and its
  rationale; descriptive justification (why it is true/effective) belongs in a
  discourse graph, not here.
type: object
additionalProperties: false
properties:
  force:
    description: >
      Normative force of this policy, as RFC 2119 requirement levels. Negation
      lives in the policy statement ("must not …"), so there is no separate
      must-not level.
    default: should
    oneOf:
      - const: must
        description: >
          Non-negotiable. A design that violates it is non-conforming; there is
          no acceptable justification for deviating.
      - const: should
        description: >
          Strong default. Deviation is permitted only with explicit, recorded
          justification, weighed against the goal served.
      - const: may
        description: >
          Preference / nice-to-have. Adopt when convenient; drop without
          ceremony.
  why:
    description: Paths to the goal(s) or mission this policy serves (upward links).
    type: array
    items:
      type: string
  source:
    description: >
      Provenance: paths to primary-source content (conversation transcripts,
      extracted docs) this policy derives from, or "user (<name>)" when
      ratified directly in conversation rather than distilled from a transcript.
    type: array
    items:
      type: string
  tags:
    description: Topic tags for cross-referencing.
    type: array
    items:
      type: string
