# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
$schema: "http://json-schema.org/draft-07/schema#"
description: >
  Provenance references — papers, reports, datasets, expert testimony, or
  a live discussion participant. Reusable across multiple claims/deductions
  (a `user`/`assistant` source is typically one stub node, cited from many
  nodes it provenances). The body text summarizes the source's relevance
  and key findings; for `user`/`assistant`, it can be as short as a name.
type: object
additionalProperties: false
required:
  - kind
  - title
properties:
  kind:
    description: >
      Type of source material. `user`/`assistant` cover claims arising
      directly from live discussion (not observational/empirical) --
      distinct from `testimony`, which is a third party's reported
      statement.
    type: string
    enum: [paper, report, book, testimony, dataset, authority, article, standard, user, assistant]
  title:
    description: Title of the source
    type: string
  authors:
    description: Author(s) of the source
    type: array
    items:
      type: string
  url:
    description: URL where the source can be accessed
    type: string
    format: uri
  date-published:
    description: When the source was published (ISO 8601)
    type: date  # YAML parses ISO dates (2026-03-10) as date objects; see llm-kb schema-design
  likelihood:
    description: How likely this source is to be reliable, 0-1 (default 1.0 — trusted until told otherwise)
    default: 1.0
    type: number
    minimum: 0
    maximum: 1
  depends:
    description: Paths to nodes this source depends on for context
    type: array
    items:
      type: string
  tags:
    description: Topic tags for cross-referencing
    type: array
    items:
      type: string
